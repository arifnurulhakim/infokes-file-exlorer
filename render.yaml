databases:
  - name: explorer-db
    plan: free
    region: singapore

services:
  - type: web
    name: explorer-api
    runtime: node
    plan: free
    region: singapore
    rootDir: apps/api
    buildCommand: curl -fsSL https://bun.sh/install | bash && export PATH="$HOME/.bun/bin:$PATH" && cd ../.. && bun install
    startCommand: export PATH="$HOME/.bun/bin:$PATH" && bun run db:migrate && bun run src/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: explorer-db
          property: connectionString
